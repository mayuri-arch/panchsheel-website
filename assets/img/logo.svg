<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" aria-label="Panchsheel Custom Lab">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0d19" />
      <stop offset="100%" stop-color="#020308" />
    </linearGradient>
    
    <!-- Gold Gradient -->
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFE885" />
      <stop offset="50%" stop-color="#D4AF37" />
      <stop offset="100%" stop-color="#AA8010" />
    </linearGradient>
    
    <!-- Neon Blue/Teal Gradient (Prism/Sublimation) -->
    <linearGradient id="cyanGrad" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#00F2FE" />
      <stop offset="100%" stop-color="#4FACFE" />
    </linearGradient>

    <!-- Glowing filter for luxury aura -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Outer Glassmorphic Container -->
  <rect x="2" y="2" width="60" height="60" rx="16" fill="url(#bgGrad)" stroke="rgba(255, 255, 255, 0.08)" stroke-width="1.5"/>
  <rect x="3" y="3" width="58" height="58" rx="15" fill="none" stroke="rgba(255, 255, 255, 0.03)" stroke-width="1"/>

  <!-- Logo Mark: Overlay of dynamic glowing ribbons forming a stylized 'P' -->
  <g transform="translate(32, 32)">
    <!-- Soft background aura glow -->
    <circle r="14" fill="#D4AF37" opacity="0.12" filter="url(#glow)"/>
    
    <!-- Outer orbiting dynamic loop (representing printer calibration/precision) -->
    <circle r="18" fill="none" stroke="url(#cyanGrad)" stroke-width="1.5" stroke-dasharray="8 8" opacity="0.6"/>

    <!-- Left vertical anchor line (stylized gold needle/press alignment) -->
    <line x1="-8" y1="-14" x2="-8" y2="14" stroke="url(#goldGrad)" stroke-width="3" stroke-linecap="round"/>

    <!-- Overlapping Ribbon loop of the 'P' (DTF / Sublimation overlap) -->
    <path d="M-8, -10 C-1, -10 8, -5 8, 2 C8, 9 -1, 10 -8, 10" fill="none" stroke="url(#goldGrad)" stroke-width="3.5" stroke-linecap="round"/>
    
    <!-- Dynamic glowing printing beam intersecting the ribbon -->
    <path d="M-12, -2 C-4, -2 4, 3 12, 3" fill="none" stroke="url(#cyanGrad)" stroke-width="2.5" stroke-linecap="round" filter="url(#glow)"/>
    
    <!-- White hot core precision print point -->
    <circle cx="-1" cy="0" r="2" fill="#FFFFFF" filter="url(#glow)"/>
  </g>
</svg>
